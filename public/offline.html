<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <title>FieldserviceIT Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f8fafc;
        color: #111827;
      }

      main {
        box-sizing: border-box;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      section {
        width: min(100%, 420px);
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 12px 30px rgb(15 23 42 / 0.08);
      }

      .mark {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 8px;
        background: #111827;
        border: 3px solid #2563eb;
        color: #ffffff;
        font-size: 17px;
        font-weight: 800;
      }

      h1 {
        margin: 20px 0 8px;
        font-size: 24px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #4b5563;
        font-size: 15px;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 20px;
        border-radius: 6px;
        background: #2563eb;
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        padding: 0 16px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <div class="mark">FS</div>
        <h1>You are offline</h1>
        <p>
          FieldserviceIT is installed, but this page needs a network connection. Reconnect to sync tickets,
          dispatches, photos, parts usage, and customer sign-offs.
        </p>
        <a href="/dashboard">Try again</a>
      </section>
    </main>
  </body>
</html>
